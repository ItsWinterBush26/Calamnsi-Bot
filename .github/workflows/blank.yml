name: Minecraft Server Keep-Alive Loop

on:
  workflow_dispatch: # Allows manual starting of the loop
  repository_dispatch:
    types: [trigger-next-run]

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        # Removed the cache line here to fix the lockfile error

    - name: Install dependencies
      run: npm install

    - name: Run Keep-Alive Script
      env:
        MC_HOST: 'calamansi.playwithbao.com'
        MC_PORT: '25565'
        MC_USERNAME: 'Bot'
      run: node index.js

    # --- THE LOOP MECHANISM ---
    # This step waits for 30 minutes BEFORE triggering the next workflow run.
    # Note: This will consume 30 minutes of GitHub Actions execution time.
    - name: Wait for 30 minutes
      run: sleep 1800

    - name: Trigger next run
      uses: peter-evans/repository-dispatch@v3
      with:
        token: ${{ secrets.LOOP_ACCESS_TOKEN }}
        event-type: trigger-next-run
        
